<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Tracker & Social Composer</title>
    <meta name="description" content="Browse, filter, and share Google Cloud BigQuery release updates with our modern tracker tool. Select any update to draft and compose tweets instantly.">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Dashboard Header -->
        <header>
            <div class="logo-container">
                <span class="logo-icon">⚡</span>
            </div>
            <h1 id="main-heading">BigQuery Release Explorer</h1>
            <p class="subtitle">Stay updated with the latest Google Cloud BigQuery releases. Filter by categories, search specific details, and instantly compose social updates.</p>
        </header>

        <!-- Interactive Toolbar -->
        <section class="toolbar" aria-label="Controls and filters">
            <!-- Search field -->
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search date, type or details..." aria-label="Search release notes">
            </div>

            <!-- Category Filter pills -->
            <div class="filters" id="category-filters">
                <button class="filter-btn active" data-type="all" id="filter-all">All</button>
                <button class="filter-btn" data-type="feature" id="filter-feature">Features</button>
                <button class="filter-btn" data-type="issue" id="filter-issue">Issues</button>
                <button class="filter-btn" data-type="deprecation" id="filter-deprecation">Deprecations</button>
                <button class="filter-btn" data-type="general" id="filter-general">General</button>
            </div>

            <!-- Manual Refresh Action -->
            <div class="actions-group">
                <div class="status-info">
                    <span id="cache-badge" class="type-badge" style="display:inline-block; margin-bottom: 0.25rem;">Checking...</span>
                    <div>Fetched: <span id="last-updated">Never</span></div>
                </div>
                <button id="btn-refresh" class="btn-refresh" aria-label="Refresh release feed">
                    <div class="spinner" aria-hidden="true"></div>
                    <span class="btn-text">Refresh</span>
                </button>
            </div>
        </section>

        <!-- Main Feed of Release Cards -->
        <main class="feed-container" id="feed-container" aria-live="polite">
            <!-- Skeletons render here on page load -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </main>
    </div>

    <!-- Twitter Composer Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
        <div class="modal-box">
            <!-- Modal Header -->
            <div class="modal-header">
                <div class="modal-title" id="modal-title">
                    <svg viewBox="0 0 24 24"><g><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></g></svg>
                    Compose X Post
                </div>
                <button class="modal-close" id="modal-close" aria-label="Close Composer">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="modal-body">
                <textarea id="composer-textarea" class="composer-textarea" placeholder="What's happening?" aria-label="Tweet composer editor"></textarea>
                
                <div class="composer-meta">
                    <span id="char-counter" class="char-counter">280 characters remaining</span>
                    <button id="btn-post-tweet" class="btn-post-tweet">
                        Post to X
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
